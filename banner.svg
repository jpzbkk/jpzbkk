<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="John Potenza — Co-Founder & Principal Consultant, CodeChang LLC">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="45%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FCF8E"/>
      <stop offset="55%" stop-color="#8E75B2"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <style>
      .name { font: 700 56px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; letter-spacing: 2px; fill: #ffffff; }
      .role { font: 500 25px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #C4B5FD; }
      .meta { font: 400 16px 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #A5B4FC; letter-spacing: 0.5px; }
      .mono { font: 400 15px 'SFMono-Regular', ui-monospace, 'Menlo', Consolas, monospace; fill: #7DE3B8; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect width="1200" height="260" rx="0" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#glow)"/>

  <!-- decorative AI network nodes (right) -->
  <g stroke="#A78BFA" stroke-opacity="0.35" stroke-width="1.5" fill="#C4B5FD" fill-opacity="0.55">
    <line x1="980" y1="70" x2="1070" y2="120"/>
    <line x1="1070" y1="120" x2="1010" y2="190"/>
    <line x1="1070" y1="120" x2="1140" y2="80"/>
    <line x1="1010" y1="190" x2="1110" y2="200"/>
    <line x1="980" y1="70" x2="1140" y2="80"/>
    <circle cx="980" cy="70" r="6"/>
    <circle cx="1070" cy="120" r="8" fill="#3FCF8E" fill-opacity="0.8"/>
    <circle cx="1010" cy="190" r="6"/>
    <circle cx="1140" cy="80" r="6"/>
    <circle cx="1110" cy="200" r="5"/>
  </g>

  <!-- text block -->
  <text class="name" x="70" y="112">John Potenza</text>
  <rect x="72" y="130" width="150" height="5" rx="2.5" fill="url(#accent)"/>
  <text class="role" x="70" y="172">Co-Founder &amp; Principal Consultant · CodeChang LLC</text>
  <text class="meta" x="70" y="202">Bali, Indonesia · Remote Worldwide</text>
  <text class="mono" x="70" y="232">&gt;_ turning ideas into production-ready AI</text>
</svg>
